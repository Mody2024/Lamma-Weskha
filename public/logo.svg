<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="220" fill="#0f172a" />
  <g filter="url(#shadow)">
    <!-- Bomb Icon -->
    <circle cx="380" cy="380" r="40" fill="#000" />
    <path d="M380 340 L390 320 Q400 310 410 320" stroke="#f97316" stroke-width="4" fill="none" />
    <circle cx="410" cy="320" r="5" fill="#facc15">
      <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Text Representation (Stylized Arabic-like shapes for the logo) -->
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="url(#textGradient)" font-family="sans-serif" font-weight="900" font-size="120" font-style="italic">
      اللمة
    </text>
    <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" fill="url(#textGradient)" font-family="sans-serif" font-weight="900" font-size="120" font-style="italic">
      الوسخة
    </text>
  </g>
</svg>
